# Zelvem Hosted overlay: adds pgbouncer (transaction mode) and routes the API
# through it. Use TOGETHER with the base file:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.hosted.yml up -d

services:
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    environment:
      DB_HOST: postgres
      DB_USER: zelvem
      DB_PASSWORD: ${POSTGRES_PASSWORD:-zelvem}
      DB_NAME: zelvem
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: '6432'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 6432 -U zelvem']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    environment:
      ZELVEM_HOSTED: 'true'
      # pgbouncer=true disables prepared statements (transaction mode);
      # connection_limit keeps Prisma's pool below pgbouncer's.
      DATABASE_URL: postgresql://zelvem:${POSTGRES_PASSWORD:-zelvem}@pgbouncer:6432/zelvem?pgbouncer=true&connection_limit=5
    depends_on:
      pgbouncer:
        condition: service_healthy
